name: ClaudeIsland

options:
  bundleIdPrefix: com.mitja
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_HARDENED_RUNTIME: YES

targets:
  ClaudeIsland:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: ClaudeIsland
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mitja.claude-island
        INFOPLIST_FILE: ClaudeIsland/Info.plist
        CODE_SIGN_ENTITLEMENTS: ClaudeIsland/ClaudeIsland.entitlements
        DEVELOPMENT_TEAM: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

schemes:
  ClaudeIsland:
    build:
      targets:
        ClaudeIsland: all
    run:
      config: Debug
      executable: ClaudeIsland
    archive:
      config: Release
